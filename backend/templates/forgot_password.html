<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Forgot Password - TumorDetect</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        /* Root colors */
        :root {
            --primary: #1e3a8a;
            /* navy */
            --secondary: #7c3aed;
            /* purple */
            --accent: #0b4b78;
            /* green */
            --light: #f1f5f9;
            /* page background */
            --dark: #0f172a;
            /* dark bg for navbar/footer */
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--light);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background: white;
            padding: 35px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
            width: 350px;
            text-align: center;
        }

        h2 {
            margin-bottom: 20px;
            color: var(--primary);
        }

        input[type="email"] {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border-radius: 6px;
            border: 1px solid #ddd;
            font-size: 14px;
        }

        input:focus {
            outline: none;
            border-color: var(--secondary);
        }

        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(45deg, var(--secondary), var(--primary));
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: var(--accent);
        }

        .flash {
            padding: 10px;
            margin-bottom: 12px;
            border-radius: 6px;
            font-size: 14px;
        }

        .error {
            background: #f8d7da;
            color: #842029;
        }

        .success {
            background: #d1e7dd;
            color: #0f1311;
        }

        a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 500;
        }

        a:hover {
            color: var(--accent);
        }
    </style>
</head>

<body>

    <div class="container">
        <h2>Forgot Password</h2>
        <p class="instruction">
            Enter your registered email to reset your password.
        </p>

        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        {% for category, message in messages %}
        <div class="flash {{ category }}">{{ message }}</div>
        {% endfor %}
        {% endif %}
        {% endwith %}

        <form method="POST" action="{{ url_for('forgot_password') }}">
            <input type="email" name="email" placeholder="Enter your registered email" required>
            <button type="submit">Send OTP</button>
        </form>

        <p style="margin-top:15px;">
            <a href="{{ url_for('login') }}">Back to Login</a>
        </p>
    </div>

</body>

</html>
