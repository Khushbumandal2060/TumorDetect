<!DOCTYPE html>
<html>

<head>
    <title>Reset Password - Tumor Detection System</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 8px;
            width: 350px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        h2 {
            text-align: center;
            margin-bottom: 15px;
        }

        p {
            text-align: center;
            font-size: 14px;
            margin-bottom: 15px;
        }

        .password-field {
            position: relative;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border-radius: 4px;
            border: 1px solid #ccc;
        }

        .toggle-password {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            font-size: 14px;
            color: #555;
            user-select: none;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #6b0453;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        button:hover {
            background: #450342;
        }

        .flash {
            padding: 10px;
            border-radius: 4px;
            margin-bottom: 15px;
            text-align: center;
        }

        .flash.error {
            background: #f8d7da;
            color: #a61c40;
        }

        .flash.success {
            background: #d4edda;
            color: #131614;
        }
    </style>
</head>

<body>

    <div class="container">
        <h2>Reset Password</h2>

        <p>Resetting password for: <strong>{{ session.get('reset_email') }}</strong></p>

        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        {% for category, message in messages %}
        <div class="flash {{ category }}">
            {{ message }}
        </div>
        {% endfor %}
        {% endif %}
        {% endwith %}

        <form method="POST" action="{{ url_for('reset_password') }}">
            <div class="password-field">
                <input type="password" name="password" placeholder="New Password" required minlength="6" id="password">
                <span class="toggle-password" onclick="togglePassword('password')">Show</span>
            </div>

            <div class="password-field">
                <input type="password" name="confirm_password" placeholder="Confirm New Password" required minlength="6"
                    id="confirm_password">
                <span class="toggle-password" onclick="togglePassword('confirm_password')">Show</span>
            </div>

            <button type="submit">Reset Password</button>
        </form>
    </div>

    <script>
        function togglePassword(id) {
            const input = document.getElementById(id);
            const toggle = input.nextElementSibling;
            if (input.type === "password") {
                input.type = "text";
                toggle.textContent = "Hide";
            } else {
                input.type = "password";
                toggle.textContent = "Show";
            }
        }
    </script>

</body>

</html>
