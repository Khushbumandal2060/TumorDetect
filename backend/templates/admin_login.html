<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Admin Login - TumorDetect</title>
    <style>
        :root {
            --primary: #1e3a8a;
            /* blue/navy */
            --secondary: #7c3aed;
            /* purple */
            --accent: #115185;
            /* green */
            --dark: #0f172a;
            --light: #f1f5f9;
        }

        body {
            font-family: 'Arial', sans-serif;
            background-color: var(--light);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background-color: white;
            padding: 40px 30px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        h2 {
            margin-bottom: 25px;
            color: var(--primary);
        }

        input[type="email"],
        input[type="password"] {
            width: 92%;
            padding: 12px 15px;
            margin-bottom: 20px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 16px;
            transition: 0.3s;
        }

        input:focus {
            border-color: var(--secondary);
            outline: none;
            box-shadow: 0 0 5px rgba(126, 77, 211, 0.5);
        }

        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(45deg, var(--secondary), var(--primary));
            border: none;
            color: white;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.3s ease;
        }

        button:hover {
            background: var(--accent);
        }

        .flash {
            margin-bottom: 20px;
            font-weight: bold;
            padding: 10px;
            border-radius: 6px;
            text-align: center;
        }

        .flash.error {
            background: #f8d7da;
            color: #184e8f;
        }

        .flash.success {
            background: #d1e7dd;
            color: #2c6794;
        }
    </style>
</head>

<body>
    <div class="container">
        <h2>Admin Login</h2>

        <!-- Flash messages -->
        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        {% for category, message in messages %}
        <div class="flash {{ category }}">{{ message }}</div>
        {% endfor %}
        {% endif %}
        {% endwith %}

        <!-- Login form -->
        <form method="POST" action="{{ url_for('admin_login') }}">
            <input type="email" name="email" placeholder="Admin Email" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>
    </div>
</body>

</html>
