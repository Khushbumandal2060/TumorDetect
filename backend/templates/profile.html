<!DOCTYPE html>
<html>

<head>
    <title>Profile</title>
    <!-- Font Awesome & Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <style>
        :root {
            --primary: #1e3a8a;
            /* navy */
            --secondary: #7c3aed;
            /* purple */
            --accent: var(--secondary);
            /* hover */
            --light: #f1f5f9;
            /* background */
            --dark: #0f172a;
            /* text dark */
        }

        body {
            margin: 0;
            font-family: "Segoe UI", Arial, sans-serif;
            background: var(--light);
        }

        /* Layout */
        .container {
            display: flex;
            min-height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            width: 240px;
            background: linear-gradient(180deg, var(--primary), var(--secondary));
            color: white;
            padding-top: 25px;
        }

        .sidebar h2 {
            text-align: center;
            margin-bottom: 35px;
            font-weight: 600;
        }

        .sidebar a {
            display: flex;
            align-items: center;
            color: white;
            padding: 14px 25px;
            text-decoration: none;
            font-size: 16px;
            transition: 0.3s;
        }

        .sidebar a i {
            margin-right: 12px;
            font-size: 18px;
        }

        .sidebar a:hover {
            background: var(--accent);
            padding-left: 30px;
        }

        /* Main content */
        .main {
            flex: 1;
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header {
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 20px;
            color: var(--primary);
        }

        /* Profile Card */
        .profile-card {
            background: white;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            padding: 40px 30px;
            width: 100%;
            max-width: 500px;
            text-align: center;
            transition: transform 0.2s;
        }

        .profile-card:hover {
            transform: translateY(-3px);
        }

        /* Profile Icon */
        .profile-icon {
            font-size: 60px;
            color: var(--secondary);
            margin-bottom: 20px;
        }

        .profile-card h3 {
            margin-bottom: 25px;
            color: var(--secondary);
        }

        .profile-card form {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .profile-card input[type="text"],
        .profile-card input[type="email"],
        .profile-card input[type="password"] {
            padding: 12px 15px;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-size: 15px;
            transition: border 0.3s;
        }

        .profile-card input:focus {
            border-color: var(--primary);
            outline: none;
        }

        .btn {
            background: var(--primary);
            color: white;
            padding: 12px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            transition: background 0.3s, transform 0.2s;
        }

        .btn:hover {
            background: var(--accent);
            transform: translateY(-2px);
        }

        .message {
            text-align: center;
            color: var(--dark);
            margin-bottom: 15px;
            font-weight: 500;
        }

        @media (max-width: 600px) {
            .sidebar {
                width: 60px;
            }

            .sidebar a {
                justify-content: center;
                padding: 14px 0;
            }

            .sidebar a span {
                display: none;
            }
        }
    </style>
</head>

<body>
    <div class="container">

        <!-- Sidebar -->
        <div class="sidebar">
            <h2>MRI AI</h2>
            <a href="/dashboard"><i class="fa-solid fa-house"></i><span>Dashboard</span></a>
            <a href="/predict"><i class="fa-solid fa-brain"></i><span>Predict MRI</span></a>
            <a href="/history"><i class="fa-solid fa-folder-open"></i><span>Upload History</span></a>
            <a href="/profile"><i class="fa-solid fa-user"></i><span>Profile</span></a>
            <a href="/logout"><i class="fa-solid fa-door-open"></i><span>Logout</span></a>
        </div>

        <!-- Main -->
        <div class="main">
            <div class="header">
                Profile - {{ user.username }}
            </div>

            <div class="profile-card">
                <!-- Icon -->
                <div class="profile-icon">
                    <i class="bi bi-person-circle"></i>
                </div>

                <h3>Update Your Profile</h3>

                {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                {% for category, message in messages %}
                <p class="message">{{ message }}</p>
                {% endfor %}
                {% endif %}
                {% endwith %}

                <form method="POST">
                    <input type="text" name="username" value="{{ user.username }}" placeholder="Username" required>
                    <input type="email" name="email" value="{{ user.email }}" placeholder="Email" required>
                    <input type="password" name="password" placeholder="New Password (leave blank to keep current)">
                    <button type="submit" class="btn">Update Profile</button>
                </form>
            </div>
        </div>
    </div>
</body>

</html>
