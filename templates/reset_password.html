<!DOCTYPE html>
<html>

<head>
    <title>Reset Password - TumorDetect</title>
    <style>
        :root {
            --primary: #1e3a8a;
            /* blue/navy */
            --secondary: #7c3aed;
            /* purple */
            --accent: #07557f;
            /* green */
            --dark: #0f172a;
            --light: #f1f5f9;
        }

        body {
            font-family: Arial, sans-serif;
            background: var(--light);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: white;
            padding: 35px;
            border-radius: 12px;
            width: 350px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        h2 {
            color: var(--primary);
            margin-bottom: 15px;
        }

        p {
            font-size: 14px;
            margin-bottom: 15px;
            color: #333;
        }

        .password-field {
            position: relative;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border-radius: 6px;
            border: 1px solid #ccc;
            font-size: 14px;
        }

        input:focus {
            outline: none;
            border-color: var(--secondary);
        }

        .toggle-password {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            font-size: 14px;
            color: var(--primary);
            user-select: none;
        }

        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(45deg, var(--secondary), var(--primary));
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: var(--accent);
        }

        .flash {
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 15px;
            text-align: center;
            font-size: 14px;
        }

        .flash.error {
            background: #f8d7da;
            color: #a61c40;
        }

        .flash.success {
            background: #d1e7dd;
            color: #155724;
        }
    </style>
</head>

<body>

    <div class="container">
        <h2>Reset Password</h2>

        <p>Resetting password for: <strong>{{ session.get('reset_email') }}</strong></p>

        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        {% for category, message in messages %}
        <div class="flash {{ category }}">
            {{ message }}
        </div>
        {% endfor %}
        {% endif %}
        {% endwith %}

        <form method="POST" action="{{ url_for('reset_password') }}">
            <div class="password-field">
                <input type="password" name="password" placeholder="New Password" required minlength="6" id="password">
                <span class="toggle-password" onclick="togglePassword('password')">Show</span>
            </div>

            <div class="password-field">
                <input type="password" name="confirm_password" placeholder="Confirm New Password" required minlength="6"
                    id="confirm_password">
                <span class="toggle-password" onclick="togglePassword('confirm_password')">Show</span>
            </div>

            <button type="submit">Reset Password</button>
        </form>
    </div>

    <script>
        function togglePassword(id) {
            const input = document.getElementById(id);
            const toggle = input.nextElementSibling;
            if (input.type === "password") {
                input.type = "text";
                toggle.textContent = "Hide";
            } else {
                input.type = "password";
                toggle.textContent = "Show";
            }
        }
    </script>

</body>

</html>
